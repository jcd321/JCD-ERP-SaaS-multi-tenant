<section class="page">
  <header class="page__header">
    <h1>Settings</h1>
    <p>Tenant configuration values for your organization.</p>
  </header>

  @if (loading()) {
    <p class="page__status">Loading settings...</p>
  } @else if (errorMessage()) {
    <div class="alert alert--error" role="alert">{{ errorMessage() }}</div>
  } @else {
    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th>Key</th>
            <th>Value</th>
          </tr>
        </thead>
        <tbody>
          @for (setting of settings(); track setting.key) {
            <tr>
              <td><code>{{ setting.key }}</code></td>
              <td>{{ setting.value }}</td>
            </tr>
          } @empty {
            <tr>
              <td colspan="2" class="data-table__empty">No settings found.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</section>
