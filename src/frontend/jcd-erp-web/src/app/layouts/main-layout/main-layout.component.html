<div class="main-layout">
  <aside class="sidebar">
    <div class="sidebar__brand">
      <span class="sidebar__logo" aria-hidden="true">JCD</span>
      <div class="sidebar__brand-text">
        <span class="sidebar__title">{{ 'layout.appName' | translate }}</span>
        <span class="sidebar__subtitle">{{ 'layout.brandSubtitle' | translate }}</span>
      </div>
    </div>

    <nav class="sidebar__nav" [attr.aria-label]="'layout.mainNav' | translate">
      @for (item of navItems(); track item.route) {
        <a
          class="sidebar__link"
          [routerLink]="item.route"
          routerLinkActive="sidebar__link--active"
          [routerLinkActiveOptions]="{ exact: item.route === '/' }"
        >
          <span class="sidebar__icon" [innerHTML]="item.icon" aria-hidden="true"></span>
          {{ item.labelKey | translate }}
        </a>
      }
    </nav>

    <div class="sidebar__footer">
      <p class="sidebar__version">{{ 'layout.phase' | translate }}</p>
    </div>
  </aside>

  <div class="main-layout__body">
    <header class="header">
      <div class="header__left">
        <div class="header__user-block">
          <span class="avatar">{{ userInitials() }}</span>
          <div class="header__info">
            <p class="header__user">{{ session()?.fullName }}</p>
            <p class="header__tenant">{{ session()?.tenantSlug }}</p>
          </div>
        </div>
      </div>

      <div class="header__actions">
        <app-language-switcher />
        <button
          type="button"
          class="btn btn--ghost"
          (click)="toggleTheme()"
          [attr.aria-label]="(theme() === 'light' ? 'layout.activateDarkMode' : 'layout.activateLightMode') | translate"
        >
          @if (theme() === 'light') {
            <span aria-hidden="true">◐</span> {{ 'layout.darkMode' | translate }}
          } @else {
            <span aria-hidden="true">◑</span> {{ 'layout.lightMode' | translate }}
          }
        </button>
        <button type="button" class="btn btn--secondary" (click)="logout()">
          {{ 'layout.logout' | translate }}
        </button>
      </div>
    </header>

    <main class="main-layout__content">
      <router-outlet />
    </main>
  </div>
</div>
