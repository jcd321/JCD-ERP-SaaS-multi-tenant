name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jcd_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ASPNETCORE_ENVIRONMENT: Testing
      ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=jcd_erp_test;Username=postgres;Password=postgres
      ConnectionStrings__Redis: localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        working-directory: src/backend
        run: dotnet restore Jcd.Erp.sln

      - name: Build
        working-directory: src/backend
        run: dotnet build Jcd.Erp.sln --no-restore -c Release

      - name: Test
        working-directory: src/backend
        run: dotnet test Jcd.Erp.sln --no-build -c Release --verbosity normal

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/jcd-erp-web/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend/jcd-erp-web
        run: npm ci

      - name: Build
        working-directory: src/frontend/jcd-erp-web
        run: npm run build
